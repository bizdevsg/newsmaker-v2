<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      .nm23-banner {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: linear-gradient(145deg, #020617, #0b3b8f);
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: white;
        padding: 42px 36px;
      }

      /* glow background */
      .nm23-banner::before {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, #3b82f655, transparent);
        top: -80px;
        right: -80px;
        z-index: 0;
      }

      .nm23-banner::after {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, #60a5fa55, transparent);
        bottom: -80px;
        left: -80px;
        z-index: 0;
      }

      /* content layout */
      .nm23-wrap {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 40px;
        flex-wrap: wrap;
      }

      /* left side */
      .nm23-left {
        max-width: 520px;
      }

      /* badge */
      .nm23-badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 14px;
        border-radius: 999px;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        color: #020617;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.4px;
      }

      /* title */
      .nm23-title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 10px;
      }

      /* desc */
      .nm23-desc {
        font-size: 15px;
        color: #dbeafe;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      /* button */
      .nm23-btn {
        display: inline-block;
        padding: 13px 24px;
        border-radius: 14px;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        color: #020617;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.3px;
        transition: 0.25s;
      }

      .nm23-btn:hover {
        transform: translateY(-3px) scale(1.03);
      }

      /* logo box */
      .nm23-logo {
        width: 110px;
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 22px;
        background: linear-gradient(135deg, #1d4ed8, #3b82f6);
        flex-shrink: 0;
      }

      /* chart */
      .nm23-chart {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 90px;
        opacity: 0.25;
        z-index: 0;
      }

      .nm23-chart svg {
        width: 100%;
        height: 100%;
      }

      /* dots */
      .nm23-dot {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        opacity: 0.7;
        z-index: 0;
      }

      .d1 {
        background: #3b82f6;
        top: 20px;
        left: 25px;
      }
      .d2 {
        background: #60a5fa;
        top: 70px;
        right: 40px;
      }
      .d3 {
        background: #38bdf8;
        bottom: 50px;
        left: 60px;
      }
      .d4 {
        background: #1d4ed8;
        bottom: 90px;
        right: 80px;
      }

      /* responsive */
      @media (max-width: 768px) {
        .nm23-wrap {
          flex-direction: column;
          text-align: center;
        }

        .nm23-logo {
          margin-bottom: 10px;
        }

        .nm23-title {
          font-size: 26px;
        }
      }
    </style>

    <div class="nm23-banner">
      <div class="nm23-dot d1"></div>
      <div class="nm23-dot d2"></div>
      <div class="nm23-dot d3"></div>
      <div class="nm23-dot d4"></div>

      <div class="nm23-wrap">
        <div class="nm23-logo">
          <img
            src="https://gwenstacy.newsmaker.id/assets/Logo_NM23_Ai-22_1766480039004-D2_DQ2_3.png"
            width="65"
          />
        </div>

        <div class="nm23-left">
          <span class="nm23-badge"> AI FEATURE </span>

          <div class="nm23-title">NM23 AI</div>

          <div class="nm23-desc">
            Gunakan teknologi AI untuk membaca pergerakan market, mendapatkan
            insight trading, dan analisa otomatis secara cepat dan akurat.
          </div>

          <a href="https://gwenstacy.newsmaker.id/" class="nm23-btn">
            Coba Sekarang
          </a>
        </div>
      </div>

      <div class="nm23-chart">
        <svg viewBox="0 0 500 100" preserveAspectRatio="none">
          <polyline
            points="0,80 60,65 120,70 180,45 240,55 300,30 360,35 420,18 500,22"
            fill="none"
            stroke="white"
            stroke-width="3"
          />
        </svg>
      </div>
    </div>
  </body>
</html>
